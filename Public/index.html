<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TikTok Downloader</title>

  <style>
    body {
      font-family: Arial;
      background-color: #1e5cc8;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background-color: #00c853;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #00a844;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Download Video TikTok</h1>
    <p>Tanpa Watermark • Cepat • Gratis</p>

    <input type="text" id="link" placeholder="Tempel link TikTok di sini">
    <button onclick="downloadVideo()">Download</button>
  </div>

  <script>
    function downloadVideo() {
      const link = document.getElementById("link").value;

      if (!link) {
        alert("Masukkan link TikTok dulu!");
        return;
      }

      // Redirect ke SnapTik
      window.open(
        `https://snaptik.app/en?url=${encodeURIComponent(link)}`,
        "_blank"
      );
    }
  </script>
</body>
</html>
